#Kotlin
kotlin.code.style=official
kotlin.daemon.jvmargs=-Xmx6144M
kotlin.native.jvmArgs=-Xmx8g -XX:MaxMetaspaceSize=1g
kotlin.native.cacheKind=none
kotlin.native.disableCompilerDaemon=true

#Gradle
org.gradle.jvmargs=-Xmx8g -Dfile.encoding=UTF-8 -Djava.awt.headless=true -XX:MaxMetaspaceSize=1g
org.gradle.console=plain
org.gradle.workers.max=1
moko.resources.disableStaticFrameworkWarning=true
kotlin.mpp.androidSourceSetLayoutVersion=2

#Android
android.nonTransitiveRClass=true
android.useAndroidX=true
